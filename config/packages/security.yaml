security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                username_parameter: _username
                password_parameter: _password
                default_target_path: front_home
                enable_csrf: true
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'

            logout:
                path: app_logout
                target: front_home

    access_control:
        # Allow anonymous access
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/sign-up, roles: PUBLIC_ACCESS }
        - { path: ^/theme, roles: PUBLIC_ACCESS }
        - { path: ^/_trending, roles: PUBLIC_ACCESS }
        - { path: ^/annonce, roles: PUBLIC_ACCESS }
        - { path: ^/commentaire, roles: PUBLIC_ACCESS }
        - { path: ^/api/catalog/products$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/products$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/products/\d+$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/joueurs/\d+$, roles: PUBLIC_ACCESS, methods: [GET] }

        # Restrict product catalog mutations
        - { path: ^/api/products$, roles: ROLE_ADMIN, methods: [POST] }
        - { path: ^/api/products/\d+$, roles: ROLE_ADMIN, methods: [PUT, PATCH, DELETE] }

        # Other API endpoints require at least an authenticated user
        - { path: ^/api, roles: ROLE_USER }

        # Admin routes
        - { path: ^/back, roles: ROLE_ADMIN }
        - { path: ^/admin, roles: ROLE_ADMIN }

        # Everything else requires authentication
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
